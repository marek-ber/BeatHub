<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeatHub</title>

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-5">
    <div class="container">

        <a class="navbar-brand" href="{% url 'home' %}">
            BeatHub
        </a>

        <div class="collapse navbar-collapse">

            <ul class="navbar-nav me-auto">

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'home' %}">
                        Strona główna
                    </a>
                </li>

                <li class="nav-item">
                    <a class="nav-link" href="{% url 'artist_list' %}">
                        Wykonawcy
                    </a>
                </li>

            </ul>

            <form
                class="d-flex me-3"
                method="GET"
                action="{% url 'search' %}"
            >
                <input
                    class="form-control me-2"
                    type="search"
                    name="q"
                    placeholder="Szukaj..."
                >

                <button
                    class="btn btn-outline-light"
                    type="submit"
                >
                    Szukaj
                </button>
            </form>

            {% if user.is_authenticated %}

                <a
                    href="{% url 'profile' user.username %}"
                    class="btn btn-outline-light me-2"
                >
                    Profil
                </a>

                <form
                    method="POST"
                    action="{% url 'logout' %}"
                >
                    {% csrf_token %}

                    <button
                        type="submit"
                        class="btn btn-danger"
                    >
                        Wyloguj
                    </button>
                </form>

            {% else %}

                <a
                    href="{% url 'login' %}"
                    class="btn btn-outline-light me-2"
                >
                    Zaloguj
                </a>

                <a
                    href="{% url 'register' %}"
                    class="btn btn-light"
                >
                    Rejestracja
                </a>

            {% endif %}

        </div>

    </div>
</nav>

<div class="container">

    {% block content %}
    {% endblock %}

</div>

</body>
</html>
