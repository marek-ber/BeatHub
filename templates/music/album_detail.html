{% extends "base.html" %}

{% block content %}

<div class="row mb-5">

    <div class="col-md-4">

        {% if album.cover %}
            <img
                src="{{ album.cover.url }}"
                class="card-img-top object-fit-cover"
                style="height: 300px;"
            >
        {% endif %}

    </div>

    <div class="col-md-8">

        <h1>{{ album.title }}</h1>

        <h4 class="text-muted">
            {{ album.artist.pseudonym }}
        </h4>

        <p class="mt-3">
            Data wydania: {{ album.release_date }}
        </p>

    </div>

</div>

<h2 class="mb-4">Piosenki</h2>

<ul class="list-group">

    {% for song in songs %}

        <li class="list-group-item d-flex justify-content-between">

            <span>
                {{ song.title }}
            </span>

            <span>
                {{ song.duration_formatted }}
            </span>

        </li>

    {% endfor %}

</ul>

{% endblock %}
