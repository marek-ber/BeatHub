{% extends "base.html" %}

{% block content %}

<h1>Usuń playliste</h1>

<p>
    Czy na pewno chcesz usunąć:
    <strong>{{ playlist.name }}</strong>?
</p>

<form method="POST">
    {% csrf_token %}

    <button class="btn btn-danger">
        Tak, usuń
    </button>

    <a href="{% url 'playlist_detail' playlist.id %}" class="btn btn-secondary">
        Anuluj
    </a>
</form>

{% endblock %}
